name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  windows-build-and-smoke:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none

      - name: Run build and smoke
        shell: pwsh
        run: |
          ./scripts/dev-env.ps1
